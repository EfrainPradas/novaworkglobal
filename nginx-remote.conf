server {
    server_name 3.145.4.238.nip.io;
    client_max_body_size 50M;

    # Include MIME types explicitly
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global root - simplification
    root /var/www;

    # ============================================================================
    # NovaWork Global - /novaworkglobal/
    # ============================================================================
    location /novaworkglobal/ {
        try_files $uri $uri/ /novaworkglobal/index.html;
        
        # Explicit Types for this location just in case
        types {
            application/javascript js mjs;
            text/css css;
            text/html html htm shtml;
        }
    }

    # Specific block for assets to ensure caching and types
    location /novaworkglobal/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Prevent index.html from being cached
    location = /novaworkglobal/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # NovaWork Global API Proxy
    location /novaworkglobal-api/ {
        rewrite ^/novaworkglobal-api/(.*) /$1 break;
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ============================================================================
    # OwnerIQ - /ownerIQ/
    # ============================================================================
    location /ownerIQ/ {
        alias /var/www/ownerIQ/frontend/;
        index index.html;
        try_files $uri $uri/ /ownerIQ/index.html;
    }

    # OwnerIQ API proxy
    location /ownerIQ-api/ {
        rewrite ^/ownerIQ-api/(.*) /$1 break;
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirect root to NovaWork Global
    location = / {
        return 301 /novaworkglobal/;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/3.145.4.238.nip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/3.145.4.238.nip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 3.145.4.238.nip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 3.145.4.238.nip.io;
    return 404; # managed by Certbot
}
