server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 3.145.4.238.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 3.145.4.238.nip.io;

    client_max_body_size 50M;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/3.145.4.238.nip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/3.145.4.238.nip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # NovaWork Global Frontend
    location /novaworkglobal {
        alias /var/www/novaworkglobal;
        index index.html;
        try_files $uri $uri/ /novaworkglobal/index.html;
    }

    # NovaWork Global API Proxy
    location /novaworkglobal-api {
        rewrite ^/novaworkglobal-api/(.*) /$1 break;
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # OwnerIQ
    location /ownerIQ {
        alias /var/www/ownerIQ;
        index index.html;
        try_files $uri $uri/ /ownerIQ/index.html;
    }

    location /ownerIQ-api {
        rewrite ^/ownerIQ-api/(.*) /$1 break;
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Root fallback
    location / {
        root /var/www;
        index index.html;
    }
}
